<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vine Explorer — Compact View</title>
  <link rel="stylesheet" href="compact.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <h1>&#127808; Vine Explorer</h1>
      <span id="result-count" class="result-count"></span>
    </div>
    <div class="header-right">
      <a href="https://www.amazon.com/vine/vine-items?queue=potluck" target="_blank" class="btn btn-secondary">
        &#127808; Open Vine
      </a>
    </div>
  </header>

  <div class="toolbar">
    <input type="search" id="search-input" placeholder="Search title or description…" autocomplete="off" />

    <div class="filters">
      <label>ETV $<input type="number" id="min-etv" placeholder="min" min="0" step="0.01" /></label>
      <span>–</span>
      <label>$<input type="number" id="max-etv" placeholder="max" min="0" step="0.01" /></label>

      <label class="checkbox-label">
        <input type="checkbox" id="keywords-only" />
        Keywords only
      </label>

      <label class="checkbox-label">
        <input type="checkbox" id="include-removed" />
        Show removed
      </label>
    </div>
  </div>

  <div class="table-wrapper">
    <table id="product-table">
      <thead>
        <tr>
          <th class="col-img">Image</th>
          <th class="col-title sortable" data-col="title">Title &#8597;</th>
          <th class="col-vendor sortable" data-col="vendor">Vendor &#8597;</th>
          <th class="col-desc">Description</th>
          <th class="col-opts">Options</th>
          <th class="col-etv sortable" data-col="etv">ETV &#8597;</th>
          <th class="col-date sortable" data-col="dateFirstSeen">Seen &#8597;</th>
          <th class="col-status">Status</th>
        </tr>
      </thead>
      <tbody id="product-tbody">
        <tr class="loading-row"><td colspan="8">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Description popover (click backdrop to close) -->
  <div id="desc-popover" class="desc-popover hidden">
    <div id="desc-content">
      <button id="desc-close" class="desc-close">✕</button>
    </div>
  </div>

  <script src="compact.js" type="module"></script>
</body>
</html>
